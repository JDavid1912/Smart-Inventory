<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SmartStock</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-white">
    <div class="min-h-screen w-full flex">
        <!-- Left Side -->
        <div class="hidden lg:flex lg:w-1/2 bg-blue-700 relative overflow-hidden items-center justify-center p-12">
            <div class="relative z-10 text-center space-y-8 max-w-md">
                <div class="flex flex-col items-center">
                    <div class="p-4 bg-white-10 rounded-2xl border border-white-20 mb-6">
                        <i data-lucide="shield" class="w-16 h-16 text-white"></i>
                    </div>
                    <h1 class="text-5xl font-display font-bold text-white mb-2 tracking-tight">SmartStock</h1>
                    <p class="text-blue-100 text-xl">Únase a una forma más inteligente de gestionar su inventario.</p>
                </div>
                <img src="https://images.unsplash.com/photo-1553413077-190dd305871c?auto=format&fit=crop&q=80&w=800" 
                     class="rounded-2xl shadow-lg border border-white-20 mt-12 w-full">
            </div>
        </div>

        <!-- Right Side -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-8 overflow-y-auto">
            <div class="w-full max-w-lg space-y-8">
                <div class="text-center space-y-2">
                    <h2 class="text-3xl font-display font-bold text-slate-900">Registro de Negocio Personalizado</h2>
                    <p class="text-slate-500">Cree su cuenta y personalice su incorporación.</p>
                </div>

                <form class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700">Correo Electrónico</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                            <input type="email" placeholder="Correo Electrónico" 
                                   class="auth-input-light">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700">Contraseña</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                            <input type="password" placeholder="••••••••" 
                                   class="auth-input-light">
                        </div>
                    </div>

                    <div class="space-y-4">
                        <label class="text-sm font-semibold text-slate-700">¿Qué vende?</label>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="category-card active">
                                <i data-lucide="cpu" class="w-8 h-8 mb-2"></i>
                                <span class="text-xs font-bold">Electrónica</span>
                            </div>
                            <div class="category-card">
                                <i data-lucide="shopping-basket" class="w-8 h-8 mb-2"></i>
                                <span class="text-xs font-bold">Abarrotes</span>
                            </div>
                            <div class="category-card">
                                <i data-lucide="pill" class="w-8 h-8 mb-2"></i>
                                <span class="text-xs font-bold">Farmacia</span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary-blue">
                        Crear Cuenta
                    </button>

                    <p class="text-center text-slate-500 text-sm">
                        ¿Ya tiene una cuenta? <a href="login.html" class="text-blue-600 font-bold">Iniciar Sesión</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
