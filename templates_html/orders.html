<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - InventoryPro</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/inventory.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 flex min-h-screen">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo-box"><i data-lucide="package" class="w-6 h-6 text-white"></i></div>
            <span class="text-xl font-display font-bold text-white">InventoryPro</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Panel de Control</a>
            <a href="inventory.html" class="nav-item"><i data-lucide="package"></i> Inventario</a>
            <a href="orders.html" class="nav-item active"><i data-lucide="shopping-cart"></i> Pedidos</a>
            <a href="reports.html" class="nav-item"><i data-lucide="bar-chart-3"></i> Informes</a>
            <a href="settings.html" class="nav-item"><i data-lucide="settings"></i> Configuración</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="header">
            <h1 class="text-2xl font-display font-bold text-slate-900">Gestión de Pedidos</h1>
            <div class="flex items-center gap-6">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" placeholder="Buscar pedidos..." class="search-bar">
                </div>
                <i data-lucide="bell" class="w-5 h-5 text-slate-400"></i>
                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100" class="rounded-full" style="width: 40px; height: 40px;">
            </div>
        </header>

        <div class="p-8 space-y-6">
            <div class="flex items-center justify-between">
                <div class="flex gap-4">
                    <button class="btn-outline">Todos los Pedidos</button>
                    <button class="btn-outline" style="color: #64748b;">Pendientes</button>
                </div>
                <button class="btn-primary-blue" style="width: auto; padding: 0.625rem 1.5rem;">
                    <i data-lucide="download" class="w-4 h-4"></i> Exportar CSV
                </button>
            </div>

            <div class="data-table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID de Pedido</th><th>Cliente</th><th>Fecha</th><th>Total</th><th>Estado</th><th style="text-align: center;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="text-sm font-bold" style="color: #2563eb;">ORD-7721</td>
                            <td class="text-sm font-medium">Tech Solutions Inc.</td>
                            <td class="text-sm text-slate-500">24 Oct, 2025</td>
                            <td class="text-sm font-bold">$1,245.00</td>
                            <td><span class="badge badge-success">Completado</span></td>
                            <td style="text-align: center;"><i data-lucide="eye" class="w-4 h-4 text-slate-400"></i></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
