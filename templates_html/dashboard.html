<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - InventoryPro</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="flex">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo-box"><i data-lucide="package" style="color: white;"></i></div>
            <span class="font-display" style="color: white; font-weight: 700; font-size: 1.25rem;">InventoryPro</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item active"><i data-lucide="layout-dashboard"></i> Panel de Control</a>
            <a href="inventory.html" class="nav-item"><i data-lucide="package"></i> Inventario</a>
            <a href="orders.html" class="nav-item"><i data-lucide="shopping-cart"></i> Pedidos</a>
            <a href="reports.html" class="nav-item"><i data-lucide="bar-chart-3"></i> Informes</a>
            <a href="settings.html" class="nav-item"><i data-lucide="settings"></i> Configuración</a>
        </nav>
    </aside>

    <main class="flex-1">
        <header class="header">
            <h1 class="font-display" style="font-size: 1.5rem; font-weight: 700;">Panel de Inventario Inteligente</h1>
            <div class="flex items-center gap-4">
                <div style="position: relative;">
                    <i data-lucide="search" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; color: #94a3b8;"></i>
                    <input type="text" class="search-bar" placeholder="Buscar...">
                </div>
                <i data-lucide="bell" style="color: #94a3b8; cursor: pointer;"></i>
                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100" style="width: 40px; height: 40px; border-radius: 50%;">
            </div>
        </header>

        <div class="p-8">
            <div class="flex gap-4 mb-8">
                <!-- Stat Cards -->
                <div class="stat-card flex-1">
                    <div class="stat-icon-container" style="background: #eff6ff; color: #3b82f6;"><i data-lucide="dollar-sign"></i></div>
                    <div><p class="text-xs text-slate-500">Valor Total</p><p class="text-2xl font-bold">$1,245,000</p></div>
                </div>
                <div class="stat-card flex-1">
                    <div class="stat-icon-container" style="background: #f5f3ff; color: #6366f1;"><i data-lucide="trending-up"></i></div>
                    <div><p class="text-xs text-slate-500">Stock Bajo</p><p class="text-2xl font-bold">14</p></div>
                </div>
            </div>

            <div class="chart-container">
                <h3 class="font-display mb-6 font-bold">Tendencias de Ventas</h3>
                <canvas id="salesChart" style="max-height: 300px;"></canvas>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun'],
                datasets: [{
                    label: 'Ventas',
                    data: [120, 190, 150, 250, 220, 300],
                    borderColor: '#3b82f6',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(59, 130, 246, 0.1)'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    </script>
</body>
</html>
