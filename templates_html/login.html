<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartInventory</title>
    <!-- CSS LOCALES - SIN TAILWIND -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page min-h-screen">
    <div class="auth-overlay"></div>
    <img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=1600" class="auth-bg-img">

    <div class="auth-content">
        <div class="auth-text-side">
            <div class="flex items-center gap-3" style="margin-bottom: 2rem;">
                <i data-lucide="box" style="color: var(--brand-primary); width: 32px; height: 32px;"></i>
                <span class="font-display" style="font-size: 1.5rem; font-weight: 700;">SmartInventory</span>
            </div>
            <h1 class="font-display">Bienvenido a SmartInventory.<br><span style="color: var(--brand-primary);">Control Inteligente</span></h1>
            <p style="font-size: 1.25rem; color: #cbd5e1;">Optimice sus operaciones con nuestro sistema avanzado.</p>
        </div>

        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i data-lucide="box" style="color: var(--brand-primary); width: 48px; height: 48px; margin-bottom: 1rem;"></i>
                <h2 class="font-display" style="color: white; font-size: 1.875rem;">Inicio de Sesión Inteligente Premium</h2>
            </div>

            <form>
                <div class="form-group">
                    <label class="form-label">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" class="auth-input" placeholder="Correo Electrónico">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" class="auth-input" placeholder="Contraseña">
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    Entrar al Sistema <i data-lucide="arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
